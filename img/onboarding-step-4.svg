    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg4)" />
  <rect x="240" y="90" width="800" height="540" rx="30" fill="#080d17" stroke="#32405b" stroke-width="3" />
  <text x="300" y="160" fill="#f0f5ff" font-size="38" font-family="Sora, Arial, sans-serif" font-weight="700">Configurações do cofre</text>
