<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Banco Ocioso | Ranking</title>
  <meta name="description" content="Ranking global do Banco Ocioso com usuários que mais bateram metas." />
  <link rel="icon" type="image/png" href="img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Poppins:wght@400;600;700&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="header">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      Banco Ocioso
    </a>
    <button id="menuToggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="mainNav">Menu</button>
    <nav id="mainNav" class="nav">
      <a href="index.html">Cofres</a>
      <a href="chats.html">Chats</a>
      <a href="notificacoes.html">Notificações</a>
      <a href="perfil.html">Perfil</a>
    </nav>

    <div class="auth-widget" aria-live="polite">
      <button id="authToggle" class="auth-toggle" type="button" aria-label="Abrir login" aria-expanded="false" aria-controls="authPanel">Login</button>

      <div id="authPanel" class="auth-float-panel" aria-hidden="true">
        <div class="auth-head">
          <strong>Acesso da conta</strong>
          <button id="authClose" class="auth-close" type="button" aria-label="Fechar login">×</button>
        </div>

        <div id="authGuest" class="auth-panel">
          <div class="auth-tabs">
            <button id="tabLogin" class="btn btn-ghost auth-tab active" type="button">Entrar</button>
            <button id="tabRegister" class="btn btn-ghost auth-tab" type="button">Criar conta</button>
          </div>

          <form id="loginForm" class="auth-form" novalidate>
            <div class="field-grid auth-grid">
              <label>E-mail<input id="loginEmail" type="email" placeholder="voce@email.com" required /></label>
              <label>Senha<input id="loginPassword" type="password" placeholder="Sua senha" required /></label>
            </div>
            <button class="btn btn-primary" type="submit">Entrar agora</button>
          </form>

          <form id="registerForm" class="auth-form hidden" novalidate>
            <div class="field-grid auth-grid">
              <label>E-mail<input id="registerEmail" type="email" placeholder="voce@email.com" required /></label>
              <label>Nome<input id="registerName" type="text" placeholder="Seu nome" required /></label>
              <label>Senha<input id="registerPassword" type="password" placeholder="Minimo 6 caracteres" required /></label>
            </div>
            <button class="btn btn-primary" type="submit">Criar conta</button>
          </form>
        </div>

        <div id="authUser" class="auth-panel hidden">
          <p class="auth-welcome">Conectado como <strong id="authUserName"></strong>.</p>
          <a class="btn btn-primary auth-user-link" href="perfil.html">Abrir perfil</a>
          <a class="btn btn-ghost auth-user-link" href="personalizacao.html">Personalizar perfil</a>
          <button id="logoutBtn" class="btn btn-ghost" type="button">Sair</button>
        </div>

        <p id="authFeedback" class="feedback" aria-live="polite"></p>
      </div>
    </div>
  </header>

  <main>
    <section id="ranking" class="section reveal visible">
      <div class="section-head">
        <h2>Ranking global</h2>
        <p>Toque em um usuário para ver o perfil completo.</p>
      </div>

      <div class="panel">
        <div id="rankingList" class="ranking-list" aria-live="polite"></div>
        <p id="rankingFeedback" class="feedback" aria-live="polite"></p>

        <article id="rankingProfileSheet" class="ranking-profile-sheet hidden" aria-live="polite">
          <div class="ranking-profile-banner" aria-hidden="true"></div>
          <div class="ranking-profile-head">
            <strong>Perfil no ranking</strong>
            <button id="rankingProfileClose" class="ranking-profile-close" type="button" aria-label="Fechar perfil do ranking">×</button>
          </div>
          <div class="ranking-profile-body">
            <img id="rankingProfileAvatar" class="ranking-profile-avatar" src="" alt="Foto do usuário do ranking" />
            <div class="ranking-profile-content">
              <h3 id="rankingProfileName" class="ranking-profile-name">Usuário</h3>
              <p id="rankingProfileTheme" class="ranking-profile-text">Tema</p>
              <p id="rankingProfileBio" class="ranking-profile-text">Descrição</p>
              <p id="rankingProfileGoals" class="ranking-profile-text">Metas batidas</p>
              <p id="rankingProfileCreated" class="ranking-profile-text">Conta criada</p>
              <p id="rankingProfileUpdated" class="ranking-profile-text">Atualizado</p>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>

<nav class="app-bottom-nav" aria-label="Navegação principal do app">
    <a class="app-nav-item" href="index.html" aria-label="Cofres">
      <span class="app-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 9.5V20h16V9.5M2 10l10-8 10 8"/><path d="M9 20v-6h6v6"/></svg></span><span class="app-nav-label">Cofres</span>
    </a>
    <a class="app-nav-item" href="chats.html" aria-label="Chats">
      <span class="app-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 5h14v10H9l-4 4V5z"/><path d="M8 9h8M8 12h5"/></svg></span><span class="app-nav-label">Chats</span>
    </a>
    <a class="app-nav-item" href="notificacoes.html" aria-label="Notificações">
      <span class="app-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 17H5l-2 2V9a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v4"/><path d="M18 8v1"/><path d="M18 11a4 4 0 0 1 4 4c0 2.2-1.8 4-4 4s-4-1.8-4-4 1.8-4 4-4z"/></svg></span><span class="app-nav-label">Notificações</span>
    </a>
    <a class="app-nav-item" href="perfil.html" aria-label="Perfil">
      <span class="app-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/><path d="M3 21a9 9 0 0 1 18 0"/></svg></span><span class="app-nav-label">Perfil</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
